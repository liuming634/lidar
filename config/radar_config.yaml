%YAML:1.0
---
# ============================================================
# 统一场地配置文件
# 换场地时主要修改此文件，配合更换 config/elevation/ 下的高程图
#
# 注意：
#   - 相机内参和外参保留在 camera_params.yaml / out_matrix.yaml
#     （因为它们会被 calibrate 节点写入）
#   - 模型路径保留在 detect_params.yaml
#   - map.yaml 用于 nav2 map_server（独立格式）
#
# 外参标定命令（ROS2 节点，选5个场地特征点 → solvePnP）：
#   ros2 launch tdt_vision calibrate_radar.launch.py
#   操作：按 Enter 进入标定 → 鼠标左键选点 → WASD 微调 → 按 n 确认
#   选完5个点自动解算，结果写入 config/out_matrix.yaml
# ============================================================

# ============================================================
# 1. 场地基本尺寸 【换场地必须改】
# ============================================================
# 根据 field_map.pcd 点云范围计算:
# X: 0.0 ~ 9.049m, Y: -2.341 ~ 1.601m
field_width: 9.049
field_height: 3.942

# ============================================================
# 2. 透视变换参考点 (parser::get_2d 使用) 【换场地可能需要改】
#    四个场地坐标点，用于计算像素→场地的透视变换矩阵
#    装甲板中心离地高度 armor_height（跟场地无关，不用改）
# ============================================================
perspective:
  armor_height: 0.15
  ref1: { x: 4.5, y: 1.2 }
  ref2: { x: 6.2, y: 1.4 }
  ref3: { x: 4.1, y: -0.6 }
  ref4: { x: 2.4, y: -0.8 }

# ============================================================
# 3. 高程图 【换场地必须改】
# ============================================================
elevation:
  image: "config/elevation/3_elevation_gray256.png"
  z_min: -1.265726
  z_max: 2.614000
  no_data: 255

# ============================================================
# 4. 小地图（resolve / debug_map 可视化用）【换场地可能需要改】
# ============================================================
field_map: "config/elevation/3_elevation_gray256.png"
display_scale: 25

# ============================================================
# 5. 标定参考点 (calibrate 节点) 【换场地可能需要改】
#    在图像上选取这些已知 3D 坐标的场地特征点，
#    调用 solvePnP 解算相机外参
# ============================================================
calibrate_points:
  self_fortress: { x: 4.116, y: 1.122, z: 2.428 }
  self_tower:    { x: 10.936, y: -11.161, z: 0.868 }
  enemy_base:    { x: 25.49, y: -7.5, z: 1.24524 }
  enemy_tower:   { x: 16.925, y: -3.625, z: 1.745 }
  enemy_high:    { x: 20.20, y: -10.8, z: 0.8 }

# ============================================================
# 6. GICP 配准 (localization 节点) 【换场地必须改】
# ============================================================
gicp:
  pcd_path: "rosbag/field_map/field_map.pcd"  # 【换场地必须改】
  crop:                               # 【换场地必须改】
    x_min: 0.0
    x_max: 9.1
    y_min: -2.4
    y_max: 1.7
    z_max: 3.0
  voxel_leaf_size: 0.1               # 算法参数，一般不用动
  fitness_threshold: 0.2
  accumulate_frames: 20
  grid_degrees: 0.1

# ============================================================
# 7. 动态点云 (dynamic_cloud 节点) 【换场地必须改】
# ============================================================
dynamic:
  pcd_path: "rosbag/field_map/field_map.pcd"  # 【换场地必须改】
  kdtree_threshold: 0.1              # 算法参数，一般不用动
  accumulate_frames: 3               # 算法参数，一般不用动
  crop:                               # 【换场地必须改】
    x_min: 0.0
    x_max: 9.1
    y_min: -2.4
    y_max: 1.7
    z_min: 0.0
    z_max: 1.4
  exclude_zones: []                   # 新场地暂无排除区域
