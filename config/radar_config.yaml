%YAML:1.0
---
# ============================================================
# 统一场地配置文件
# 换场地时主要修改此文件，配合更换 config/elevation/ 下的高程图
#
# 注意：
#   - 相机内参和外参保留在 camera_params.yaml / out_matrix.yaml
#     （因为它们会被 calibrate 节点写入）
#   - 模型路径保留在 detect_params.yaml
#   - map.yaml 用于 nav2 map_server（独立格式）
# ============================================================

# ============================================================
# 1. 场地基本尺寸
# ============================================================
field_width: 28.0
field_height: 15.0

# ============================================================
# 2. 透视变换参考点 (parser::get_2d 使用)
#    四个场地坐标点，用于计算像素→场地的透视变换矩阵
#    装甲板中心离地高度 armor_height
# ============================================================
perspective:
  armor_height: 0.15
  ref1: { x: 12.0, y: -6.0 }
  ref2: { x: 16.0, y: -6.0 }
  ref3: { x: 16.0, y: -8.0 }
  ref4: { x: 12.0, y: -8.0 }

# ============================================================
# 3. 高程图
# ============================================================
elevation:
  image: "config/elevation/2_elevation_gray256.png"
  z_min: -0.187180
  z_max: 1.969253
  no_data: 255

# ============================================================
# 4. 小地图（resolve / debug_map 可视化用）
# ============================================================
field_map: "config/elevation/2_elevation_gray256.png"
display_scale: 25

# ============================================================
# 5. 标定参考点 (calibrate 节点)
#    在图像上选取这些已知 3D 坐标的场地特征点，
#    调用 solvePnP 解算相机外参
# ============================================================
calibrate_points:
  self_fortress: { x: 5.471, y: -7.5, z: 0.0 }
  self_tower:    { x: 10.936, y: -11.161, z: 0.868 }
  enemy_base:    { x: 25.49, y: -7.5, z: 1.24524 }
  enemy_tower:   { x: 16.925, y: -3.625, z: 1.745 }
  enemy_high:    { x: 20.20, y: -10.8, z: 0.8 }

# ============================================================
# 6. GICP 配准 (localization 节点)
# ============================================================
gicp:
  pcd_path: "config/RM2025.pcd"
  crop:
    x_min: 5.0
    x_max: 30.0
    y_min: -10.0
    y_max: 8.0
    z_max: 7.0
  voxel_leaf_size: 0.1
  fitness_threshold: 0.2
  accumulate_frames: 20
  grid_degrees: 0.1

# ============================================================
# 7. 动态点云 (dynamic_cloud 节点)
# ============================================================
dynamic:
  pcd_path: "config/RM2025.pcd"
  kdtree_threshold: 0.1
  accumulate_frames: 3
  crop:
    x_min: 3.0
    x_max: 28.0
    y_min: 0.0
    y_max: 15.0
    z_min: 0.0
    z_max: 1.4
  exclude_zones:
    - name: "right_bottom_corner"
      x_min: 25.0
      x_max: 28.0
      y_min: 0.0
      y_max: 5.0
