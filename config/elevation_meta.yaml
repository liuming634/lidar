# ============================================
# 高程图元信息
# PCD → PNG 生成时自动写入
# ============================================
elevation_image: "2_elevation_gray256.png"  # 高程图文件路径

# 高程图覆盖的场地范围（与实际场地尺寸一致）
field_width: 28.0    # 对应 X 方向 (m)
field_height: 15.0   # 对应 Y 方向 (m)

# 图像尺寸（像素）
image_width: 2916
image_height: 1505

# 高度映射（灰度0~254 线性映射到 z_min ~ z_max）
z_min: -0.187180     # 灰度 0 对应高度 (m)
z_max: 1.969253      # 灰度 254 对应高度 (m)
no_data: 255         # 无效像素灰度值（白点）

# 计算公式：
#   H = G / 254 × (z_max - z_min) + z_min
#   其中 G 为灰度值 (0~254)
