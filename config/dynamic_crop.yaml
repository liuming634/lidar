# ============================================
# 动态点云裁剪与排除区配置
# 控制 dynamic_cloud 节点对哪些区域做动态检测
# ============================================

# 场地有效范围（只在此范围内的点做动态检测）
crop:
  x_min: 3.0    # 最小 X (m)
  x_max: 28.0   # 最大 X (m)，通常等于 field_width
  y_min: 0.0    # 最小 Y (m)
  y_max: 15.0   # 最大 Y (m)，通常等于 field_height
  z_min: 0.0    # 最低高度 (m)
  z_max: 1.4    # 最高高度 (m) —— 高于此高度认为是飞镖/无人机

# 排除区（裁剪范围内的子区域，不参与动态检测）
# 每个区域用两个对角点定义矩形
exclude_zones:
  - name: "right_bottom_corner"
    x_min: 25.0
    x_max: 28.0
    y_min: 0.0
    y_max: 5.0
