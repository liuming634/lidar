%YAML:1.0
---
# ============================================
# GICP 配准点云裁剪参数
# 控制 localization 节点配准前的点云范围
# 取决于雷达安装位置和场地大小
# ============================================

# 场地 PCD 先验点云地图路径
pcd_path: "config/RM2025.pcd"

crop:
  x_min: 5.0
  x_max: 30.0
  y_min: -10.0
  y_max: 8.0
  z_max: 7.0

# 配准参数
voxel_leaf_size: 0.1
fitness_threshold: 0.2
accumulate_frames: 20
grid_degrees: 0.1
