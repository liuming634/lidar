# ============================================
# 动态点云裁剪与排除区配置
# 控制 dynamic_cloud 节点对哪些区域做动态检测
# ============================================

# 场地 PCD 先验点云地图路径
pcd_path: "config/RM2025.pcd"

# KD-tree 动态点判定阈值
kdtree_threshold: 0.1
accumulate_frames: 3

# 场地有效范围
crop:
  x_min: 3.0
  x_max: 28.0
  y_min: 0.0
  y_max: 15.0
  z_min: 0.0
  z_max: 1.4

# 排除区（裁剪范围内的子区域，不参与动态检测）
exclude_zones:
  - name: "right_bottom_corner"
    x_min: 25.0
    x_max: 28.0
    y_min: 0.0
    y_max: 5.0
